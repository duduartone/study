<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>600词背诵计划 · 14天冲刺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --primary-dark: #1A3A6B;
  --primary: #2563EB;
  --primary-light: #3B82F6;
  --bg-main: #F0F4FA;
  --bg-card: #FFFFFF;
  --bg-card-hover: #E8F0FE;
  --text-dark: #1E293B;
  --text-mid: #64748B;
  --text-light: #FFFFFF;
  --green: #10B981;
  --orange: #F59E0B;
  --red: #EF4444;
  --purple: #6366F1;
  --teal: #0D9488;
  --rose: #BE185D;
  --border: #E2E8F0;
  --shadow: 0 2px 12px rgba(37,99,235,0.08);
  --shadow-lg: 0 8px 32px rgba(37,99,235,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-main);
  color: var(--text-dark);
  min-height: 100vh;
  font-size: 14px;
}
.header {
  background: linear-gradient(135deg, #0f2857 0%, #1A3A6B 40%, #2563EB 100%);
  color: var(--text-light);
  padding: 28px 24px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(26,58,107,0.4);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 16px;
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
.header h1 span { color: #93C5FD; }
.header-meta { text-align: right; font-size: 13px; color: #93C5FD; line-height: 1.8; }
.progress-bar-wrap {
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  height: 10px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #34D399, #10B981);
  border-radius: 20px;
  transition: width 0.5s ease;
  min-width: 4px;
}
.progress-label { font-size: 12px; color: #93C5FD; margin-top: 6px; text-align: right; }
.tabs-container {
  background: var(--bg-card);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 124px;
  z-index: 90;
  box-shadow: var(--shadow);
}
.tabs { display: flex; padding: 0 16px; min-width: max-content; }
.tab-btn {
  padding: 14px 14px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mid);
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
}
.tab-btn:hover { color: var(--primary); background: var(--bg-card-hover); border-radius: 8px 8px 0 0; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn .check-icon { color: var(--green); font-size: 11px; display: none; }
.tab-btn.done .check-icon { display: inline; }
.tab-btn .count-badge {
  background: var(--bg-main);
  color: var(--text-mid);
  border-radius: 10px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: 500;
}
.tab-btn.active .count-badge { background: var(--primary-light); color: white; }
.main-content { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
.day-panel { display: none; }
.day-panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.day-summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.summary-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow);
}
.chip-new { background: linear-gradient(135deg,#EFF6FF,#DBEAFE); color: var(--primary); border: 1.5px solid #BFDBFE; }
.chip-review { background: linear-gradient(135deg,#FFFBEB,#FEF3C7); color: #B45309; border: 1.5px solid #FDE68A; }
.chip-total { background: linear-gradient(135deg,#F0FDF4,#DCFCE7); color: #166534; border: 1.5px solid #BBF7D0; }
.section {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  overflow: hidden;
  border: 1.5px solid var(--border);
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.section-header:hover { background: var(--bg-card-hover); }
.section-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; }
.section-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.icon-new { background: #DBEAFE; }
.icon-review { background: #FEF3C7; }
.section-toggle { color: var(--text-mid); font-size: 18px; transition: transform 0.3s; }
.section-toggle.open { transform: rotate(180deg); }
.section-body { padding: 16px 20px; border-top: 1.5px solid var(--border); }
.section-body.collapsed { display: none; }
.review-group { margin-bottom: 20px; }
.review-group:last-child { margin-bottom: 0; }
.review-group-title {
  font-size: 12px; font-weight: 600; color: var(--orange);
  letter-spacing: 0.8px; margin-bottom: 10px; padding: 4px 10px;
  background: #FFFBEB; border-radius: 6px; display: inline-block;
}
.word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 14px; }

/* ── 单词卡片 ── */
.word-card {
  background: var(--bg-main);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.word-card:hover { border-color: var(--primary-light); box-shadow: 0 4px 16px rgba(37,99,235,0.12); transform: translateY(-2px); }
.word-card.mastered { background: linear-gradient(135deg,#F0FDF4,#DCFCE7); border-color: #6EE7B7; }
.word-card.review-card { border-left: 3px solid var(--orange); }
.word-card.review-card.mastered { border-left-color: var(--green); }

/* 主内容区（可点击打卡） */
.card-main {
  padding: 14px 14px 10px;
  cursor: pointer;
}
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.word-en-wrap { display: flex; align-items: center; gap: 6px; }
.word-en { font-size: 16px; font-weight: 700; color: var(--primary-dark); letter-spacing: 0.3px; }
.word-card.mastered .word-en { color: #166534; }
/* 真题标签 */
.exam-badge {
  display: inline-flex; align-items: center; gap: 2px;
  background: linear-gradient(135deg,#FDF2F8,#FCE7F3);
  color: var(--rose);
  border: 1px solid #FBCFE8;
  border-radius: 4px;
  font-size: 9px; font-weight: 700;
  padding: 1px 5px;
  white-space: nowrap;
  vertical-align: middle;
}
.check-btn {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border); background: white;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; font-size: 12px; color: transparent;
}
.word-card.mastered .check-btn { background: var(--green); border-color: var(--green); color: white; }
.word-phonetic { font-size: 12px; color: var(--text-mid); margin-bottom: 6px; font-style: italic; }
.card-bottom { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.word-pos {
  font-size: 11px; font-weight: 600; color: white;
  background: var(--primary-light); border-radius: 4px; padding: 1px 6px; white-space: nowrap;
}
.word-meaning { font-size: 13px; color: var(--text-dark); line-height: 1.5; }
.review-badge-tag {
  position: absolute; top: -1px; right: -1px;
  background: var(--orange); color: white;
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 0 var(--radius-sm) 0 var(--radius-sm);
}

/* 展开按钮区 */
.card-actions {
  display: flex;
  border-top: 1px dashed var(--border);
}
.card-expand-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 5px 8px;
  background: none;
  border: none;
  border-right: 1px dashed var(--border);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: var(--purple);
  font-family: inherit;
  transition: background 0.15s;
}
.card-expand-btn:last-child { border-right: none; }
.card-expand-btn:hover { background: var(--bg-card-hover); }
.card-expand-btn .expand-arrow { font-size: 9px; transition: transform 0.25s; display: inline-block; }
.card-expand-btn.open .expand-arrow { transform: rotate(180deg); }
.btn-exam { color: var(--rose); }
.btn-exam:hover { background: #FDF2F8; }

/* 词根词缀展开区 */
.card-detail {
  display: none;
  border-top: 1px solid var(--border);
  background: linear-gradient(135deg, #F8FAFF, #EFF4FF);
  padding: 12px 14px;
  animation: slideDown 0.25s ease;
}
.card-detail.open { display: block; }

/* 真题例句展开区 */
.card-exam {
  display: none;
  border-top: 1px solid var(--border);
  background: linear-gradient(135deg, #FFF7F9, #FEF0F5);
  padding: 12px 14px;
  animation: slideDown 0.25s ease;
}
.card-exam.open { display: block; }

@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.detail-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.detail-row:last-child { margin-bottom: 0; }
.detail-icon {
  flex-shrink: 0;
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.icon-root { background: #EDE9FE; }
.icon-tip { background: #FEF3C7; }
.icon-mnemonic { background: #DCFCE7; }
.icon-exam { background: #FCE7F3; }
.detail-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
  color: var(--text-mid); margin-bottom: 2px;
}
.detail-root { color: var(--purple); font-size: 12px; font-weight: 600; line-height: 1.4; }
.detail-tip { color: #92400E; font-size: 12px; line-height: 1.4; }
.detail-mnemonic { color: #166534; font-size: 12px; line-height: 1.4; }

/* 真题例句样式 */
.exam-sent-item {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px dashed #FBCFE8;
}
.exam-sent-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.exam-year-tag {
  display: inline-block;
  background: var(--rose);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 10px;
  margin-bottom: 5px;
}
.exam-sent-text {
  font-size: 12px;
  line-height: 1.7;
  color: #4A1942;
  font-style: italic;
}
/* 高亮匹配词 */
.exam-sent-text .hl {
  background: #FDE68A;
  border-radius: 3px;
  padding: 0 2px;
  font-style: normal;
  font-weight: 600;
  color: #92400E;
}

/* 工具栏 */
.toolbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card); border-top: 1.5px solid var(--border);
  padding: 10px 16px; display: flex; gap: 8px;
  justify-content: center; z-index: 200;
  box-shadow: 0 -4px 20px rgba(26,58,107,0.1);
  flex-wrap: wrap;
}
.btn {
  padding: 9px 16px; border-radius: 50px; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
  display: flex; align-items: center; gap: 5px;
}
.btn-primary { background: linear-gradient(135deg,var(--primary),var(--primary-light)); color: white; box-shadow: 0 4px 14px rgba(37,99,235,0.35); }
.btn-primary:hover { transform: translateY(-1px); }
.btn-secondary { background: var(--bg-main); color: var(--text-mid); border: 1.5px solid var(--border); }
.btn-secondary:hover { background: var(--bg-card-hover); color: var(--primary); }
.btn-teal { background: linear-gradient(135deg,#0D9488,#14B8A6); color: white; }
.btn-teal:hover { transform: translateY(-1px); }
.btn-teal.active-mode { background: linear-gradient(135deg,#065F46,#0D9488); box-shadow: 0 0 0 3px rgba(13,148,136,0.3); }
.btn-rose { background: linear-gradient(135deg,#BE185D,#EC4899); color: white; }
.btn-rose:hover { transform: translateY(-1px); }
.btn-rose.active-mode { background: linear-gradient(135deg,#9D174D,#BE185D); box-shadow: 0 0 0 3px rgba(190,24,93,0.3); }
.empty-review { text-align: center; color: var(--text-mid); padding: 32px; font-size: 14px; }
.empty-review-icon { font-size: 32px; margin-bottom: 8px; }
.content-padding { height: 80px; }

@media print {
  .header { position: static; background: #1A3A6B !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .tabs-container, .toolbar { display: none !important; }
  .day-panel { display: block !important; }
  .word-card { break-inside: avoid; }
  .section-body.collapsed { display: block !important; }
  .card-detail, .card-exam { display: block !important; }
  body { background: white; }
}
@media (max-width: 600px) {
  .header h1 { font-size: 18px; }
  .word-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .tabs-container { top: 112px; }
  .toolbar { padding: 8px 8px; gap: 6px; }
  .btn { padding: 8px 10px; font-size: 11px; }
}
@media (max-width: 400px) {
  .word-grid { grid-template-columns: 1fr; }
}

</style>
</head>

    <h1>📚 600词背诵计划 · <span>14天冲刺</span></h1>

</div>
<script>

const TOTAL_WORDS = 592;
let currentDay = 1;
let autoExpandEtym = false;
let autoExpandExam = false;

function getKey(day, idx) { return 'wp_d' + day + '_' + idx; }
function isMastered(day, idx) { return localStorage.getItem(getKey(day, idx)) === '1'; }
function setMastered(day, idx, val) {
  if (val) localStorage.setItem(getKey(day, idx), '1');
  else localStorage.removeItem(getKey(day, idx));
}

function calcProgress() {
  let total = 0, done = 0;
  for (const d of PLAN_DATA) {
    d.new_words.forEach((w, i) => { total++; if (isMastered(d.day, i)) done++; });
  }
  return {total, done};
}
function updateProgress() {
  const {total, done} = calcProgress();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = '已掌握 ' + done + ' / ' + TOTAL_WORDS + ' 词';
  document.getElementById('progress-pct').textContent = pct + '%';
  PLAN_DATA.forEach(d => {
    const tab = document.querySelector('.tab-btn[data-day="' + d.day + '"]');
    if (!tab) return;
    const allDone = d.new_words.length > 0 && d.new_words.every((_, i) => isMastered(d.day, i));
    tab.classList.toggle('done', allDone);
  });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightWord(text, word) {
  if (!word) return escHtml(text);
  const pattern = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\w*)', 'gi');
  return escHtml(text).replace(pattern, '<span class="hl">$1</span>');
}

function renderExamSents(sents, matchWord) {
  if (!sents || sents.length === 0) return '';
  return sents.map(s =>
    '<div class="exam-sent-item">' +
    '<span class="exam-year-tag">' + s.year + ' 真题</span>' +
    '<div class="exam-sent-text">' + highlightWord(s.text, s.match || matchWord) + '</div>' +
    '</div>'
  ).join('');
}

        '<div class="detail-icon icon-tip">💡</div>' +
        '<div><div class="detail-label">拆解技巧</div>' +
        '<div class="detail-tip">' + escHtml(word.tip) + '</div></div></div>';
    }
    if (word.mnemonic) {
      rows += '<div class="detail-row">' +
        '<div class="detail-icon icon-mnemonic">🧠</div>' +
        '<div><div class="detail-label">联想记忆</div>' +
        '<div class="detail-mnemonic">' + escHtml(word.mnemonic) + '</div></div></div>';
    }
    detailHtml = '<div class="card-detail" id="' + detailId + '">' + rows + '</div>';
  }

  // 真题例句区
  let examHtml = '';
  if (hasExam) {
    examHtml = '<div class="card-exam" id="' + examId + '">' +
      '<div class="detail-row" style="margin-bottom:0">' +
      '<div class="detail-icon icon-exam">📝</div>' +
      '<div style="flex:1"><div class="detail-label">真题例句</div>' +
      renderExamSents(word.exam_sents, word.word) +
      '</div></div></div>';
  }

  // 按钮行
  let actionsHtml = '';
  if (hasEtym || hasExam) {
    let btns = '';
    if (hasEtym) {
      btns += '<button class="card-expand-btn" id="' + etymBtnId + '" onclick="toggleDetail(\'' + detailId + '\',\'' + etymBtnId + '\',event)">' +
        '🔍 词根记忆 <span class="expand-arrow">▼</span></button>';
    }
    if (hasExam) {
      btns += '<button class="card-expand-btn btn-exam" id="' + examBtnId + '" onclick="toggleDetail(\'' + examId + '\',\'' + examBtnId + '\',event)">' +
        '📝 真题例句 <span class="expand-arrow">▼</span></button>';
    }
    actionsHtml = '<div class="card-actions">' + btns + '</div>';
  }

  return '<div class="word-card' + mc + rc + '" id="' + cid + '">' +
    reviewBadge +
    '<div class="card-main" onclick="toggleCard(' + storeDay + ',' + idx + ',this)">' +
      '<div class="card-top">' +
        '<div class="word-en-wrap">' +
          '<div class="word-en">' + escHtml(word.word) + '</div>' +
          examBadge +
        '</div>' +
        '<div class="check-btn">✓</div>' +
      '</div>' +
      '<div class="word-phonetic">' + escHtml(word.phonetic || '') + '</div>' +
      '<div class="card-bottom">' +
        (word.pos ? '<span class="word-pos">' + escHtml(word.pos) + '</span>' : '') +
        '<span class="word-meaning">' + escHtml(word.meaning) + '</span>' +
      '</div>' +
    '</div>' +
    actionsHtml +
    detailHtml +
    examHtml +
  '</div>';
}

function toggleDetail(panelId, btnId, event) {
  if (event) event.stopPropagation();
  const panel = document.getElementById(panelId);
  const btn = document.getElementById(btnId);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  if (btn) btn.classList.toggle('open', !isOpen);
}

function toggleCard(storeDay, idx, el) {
  const cur = isMastered(storeDay, idx);
  setMastered(storeDay, idx, !cur);
  document.querySelectorAll('[id^="card-' + storeDay + '-' + idx + '"]').forEach(c => {
    c.classList.toggle('mastered', !cur);
  });
  updateProgress();
}

function toggleAllEtym(expand) {
  autoExpandEtym = expand;
  document.querySelectorAll('.card-detail').forEach(d => d.classList.toggle('open', expand));
  document.querySelectorAll('[id^="ebtn-"]').forEach(b => b.classList.toggle('open', expand));
  const btn = document.getElementById('toggle-etym-btn');
  if (btn) {
    btn.textContent = (expand ? '📕 折叠词根' : '📖 展开词根');
    btn.classList.toggle('active-mode', expand);
  }
}

function toggleAllExam(expand) {
  autoExpandExam = expand;
  document.querySelectorAll('.card-exam').forEach(d => d.classList.toggle('open', expand));
  document.querySelectorAll('[id^="xbtn-"]').forEach(b => b.classList.toggle('open', expand));
  const btn = document.getElementById('toggle-exam-btn');
  if (btn) {
    btn.textContent = (expand ? '📕 折叠例句' : '📝 展开例句');
    btn.classList.toggle('active-mode', expand);
  }
}

function renderDayPanel(d) {
  const reviewCount = d.review_groups.reduce((s, g) => s + g.words.length, 0);
  const totalDay = d.new_words.length + reviewCount;
  const examCount = d.new_words.filter(w => w.exam_sents && w.exam_sents.length > 0).length;
  const newCards = d.new_words.map((w, i) => renderCard(w, d.day, i, false)).join('');
  let reviewHTML = '';
  if (d.review_groups.length === 0) {
    reviewHTML = '<div class="empty-review"><div class="empty-review-icon">🌟</div>今日无复习任务，专注学习新词！</div>';
  } else {
    reviewHTML = d.review_groups.map(g =>
      '<div class="review-group">' +
      '<div class="review-group-title">📖 来自 Day ' + g.from_day + '</div>' +
      '<div class="word-grid">' + g.words.map((w, i) => renderCard(w, g.from_day, i, true)).join('') + '</div>' +
      '</div>'
    ).join('');
  }
  const examChip = examCount > 0
    ? '<div class="summary-chip" style="background:linear-gradient(135deg,#FFF0F6,#FCE7F3);color:#BE185D;border:1.5px solid #FBCFE8">📝 真题覆盖 ' + examCount + ' 词</div>'
    : '';
  return '<div class="day-panel" id="panel-day-' + d.day + '">' +
    '<div class="day-summary">' +
    '<div class="summary-chip chip-new">📘 今日新词 ' + d.new_words.length + ' 个</div>' +
    (reviewCount > 0 ? '<div class="summary-chip chip-review">🔄 今日复习 ' + reviewCount + ' 个</div>' : '') +
    '<div class="summary-chip chip-total">📊 合计 ' + totalDay + ' 个</div>' +
    examChip +
    '</div>' +
    '<div class="section">' +
    '<div class="section-header" onclick="toggleSection(this)">' +
    '<div class="section-title"><div class="section-icon icon-new">📘</div>今日新词 · ' + d.new_words.length + ' 个</div>' +
    '<span class="section-toggle open">▼</span></div>' +
    '<div class="section-body"><div class="word-grid">' + newCards + '</div></div>' +
    '</div>' +
    '<div class="section">' +
    '<div class="section-header" onclick="toggleSection(this)">' +
    '<div class="section-title"><div class="section-icon icon-review">🔄</div>今日复习 · ' + reviewCount + ' 个</div>' +
    '<span class="section-toggle open">▼</span></div>' +
    '<div class="section-body">' + reviewHTML + '</div>' +
    '</div>' +
    '</div>';
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.section-toggle');
  body.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function buildUI() {
  const tabsRow = document.getElementById('tabs-row');
  const mainContent = document.getElementById('main-content');
  PLAN_DATA.forEach(d => {
    const reviewCount = d.review_groups.reduce((s, g) => s + g.words.length, 0);
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.day = d.day;
    btn.innerHTML = 'Day ' + d.day + '<span class="count-badge">' + d.new_words.length + '+' + reviewCount + '</span><span class="check-icon">✓</span>';
    btn.onclick = () => switchDay(d.day);
    tabsRow.appendChild(btn);
    mainContent.insertAdjacentHTML('beforeend', renderDayPanel(d));
  });
}

function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('panel-day-' + day);
  if (panel) panel.classList.add('active');
  const tab = document.querySelector('.tab-btn[data-day="' + day + '"]');
  if (tab) { tab.classList.add('active'); tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  // 全局模式同步
  if (autoExpandEtym || autoExpandExam) {
    setTimeout(() => {
      if (panel) {
        if (autoExpandEtym) {
          panel.querySelectorAll('.card-detail').forEach(d => d.classList.add('open'));
          panel.querySelectorAll('[id^="ebtn-"]').forEach(b => b.classList.add('open'));
        }
        if (autoExpandExam) {
          panel.querySelectorAll('.card-exam').forEach(d => d.classList.add('open'));
          panel.querySelectorAll('[id^="xbtn-"]').forEach(b => b.classList.add('open'));
        }
      }
    }, 50);
  }
}

function resetToday() {
  if (!confirm('确定重置 Day ' + currentDay + ' 的打卡记录？')) return;
  const d = PLAN_DATA[currentDay - 1];
  d.new_words.forEach((_, i) => setMastered(currentDay, i, false));
  const panel = document.getElementById('panel-day-' + currentDay);
  if (panel) { panel.remove(); document.getElementById('main-content').insertAdjacentHTML('beforeend', renderDayPanel(d)); document.getElementById('panel-day-' + currentDay).classList.add('active'); }
  updateProgress();
}

buildUI();
updateProgress();
switchDay(1);

</script>
</body>
</html>
